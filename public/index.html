<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 状态监控中心</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 标题 -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-2">
                🤖 Agent 状态监控中心
            </h1>
            <p class="text-gray-300 text-lg">实时可视化您的智能助手团队</p>
            <div class="mt-4 text-sm text-gray-400">
                <span id="connectionStatus">⚫ 模拟数据</span>
                <span class="ml-4" id="lastUpdate">最后更新: --</span>
                <button onclick="refreshStatus()" class="ml-4 bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded-full text-sm transition">
                    🔄 刷新
                </button>
                <button onclick="toggleDataSource()" class="ml-2 bg-purple-500 hover:bg-purple-600 text-white px-4 py-1 rounded-full text-sm transition" title="切换真实/模拟数据">
                    🔗 数据源
                </button>
                <button onclick="toggleWebSocket()" class="ml-2 bg-green-500 hover:bg-green-600 text-white px-4 py-1 rounded-full text-sm transition" title="切换WebSocket实时更新">
                    ⚡ 实时
                </button>
            </div>
        </header>

        <!-- 工作流日志 -->
        <div class="mb-6 bg-white/10 backdrop-blur-sm rounded-xl p-4">
            <h2 class="text-lg font-bold text-white mb-3 flex items-center gap-2">
                📊 工作流日志
                <span class="text-xs text-gray-400">(最近10条)</span>
            </h2>
            <div id="workflowLog" class="space-y-2">
                <div class="text-gray-400 text-sm text-center py-4">
                    暂无工作流事件...
                </div>
            </div>
        </div>

        <!-- Agent 卡片容器 -->
        <div id="agentContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Agent 卡片将通过 JavaScript 动态生成 -->
        </div>

        <!-- 状态图例 -->
        <div class="mt-12 bg-white/10 backdrop-blur-sm rounded-xl p-6 max-w-2xl mx-auto">
            <h2 class="text-xl font-bold text-white mb-4">📊 状态说明</h2>
            <div class="grid grid-cols-2 gap-4 text-gray-300">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">☕</span>
                    <span>空闲 - 喝咖啡/休息</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🛋️</span>
                    <span>空闲 - 坐在沙发</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-2xl">💻</span>
                    <span>忙碌 - 使用笔记本工作</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🔄</span>
                    <span>离线 - 不可用</span>
                </div>
            </div>
        </div>

        <!-- 通知容器 -->
        <div id="notificationContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

        <!-- 配置面板 -->
        <div id="configPanel" class="fixed bottom-4 right-4 z-40 hidden">
            <div class="bg-gray-800/95 backdrop-blur-sm rounded-xl p-4 shadow-2xl border border-white/20 max-w-md">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-white">⚙️ 配置面板</h3>
                    <button onclick="toggleConfigPanel()" class="text-gray-400 hover:text-white text-xl">×</button>
                </div>

                <div class="space-y-4">
                    <!-- 环境变量说明 -->
                    <div class="bg-blue-900/30 border border-blue-500/30 rounded-lg p-3">
                        <p class="text-sm text-blue-200">
                            <strong>💡 环境变量配置</strong>
                        </p>
                        <p class="text-xs text-blue-300 mt-1">
                            Token 现在从服务器环境变量自动获取，无需在浏览器中配置。
                        </p>
                    </div>

                    <!-- Gateway URL 显示 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">
                            Gateway URL（环境变量）
                        </label>
                        <div class="flex gap-2">
                            <input
                                type="text"
                                id="gatewayUrlInput"
                                placeholder="http://localhost:3333"
                                value="http://localhost:3333"
                                readonly
                                class="flex-1 bg-gray-700/50 border border-gray-600 rounded-lg px-3 py-2 text-gray-400 cursor-not-allowed"
                            >
                            <button
                                onclick="showProxyConfig()"
                                class="bg-cyan-500 hover:bg-cyan-600 text-white px-4 py-2 rounded-lg text-sm transition"
                            >
                                查看配置
                            </button>
                        </div>
                        <p class="text-xs text-gray-400 mt-1">
                            在服务器设置: <code>export OPENCLAW_GATEWAY_URL=...</code>
                        </p>
                    </div>

                    <!-- 测试连接 -->
                    <div>
                        <button
                            onclick="testGateway()"
                            class="w-full bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg text-sm transition flex items-center justify-center gap-2"
                        >
                            🧪 测试 Gateway 连接
                        </button>
                    </div>

                    <!-- 快捷操作 -->
                    <div class="border-t border-gray-700 pt-4">
                        <p class="text-sm text-gray-300 mb-2">快捷操作:</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button
                                onclick="quickConnectToGateway()"
                                class="bg-purple-500 hover:bg-purple-600 text-white py-2 px-3 rounded-lg text-sm transition"
                            >
                                🔗 连接 Gateway
                            </button>
                            <button
                                onclick="resetToMockData()"
                                class="bg-gray-600 hover:bg-gray-700 text-white py-2 px-3 rounded-lg text-sm transition"
                            >
                                ⚫ 重置模拟数据
                            </button>
                        </div>
                    </div>

                    <!-- 帮助信息 -->
                    <div class="border-t border-gray-700 pt-3">
                        <p class="text-xs text-gray-400">
                            <strong>设置步骤:</strong><br>
                            1. 设置环境变量（服务器端）<br>
                            2. 重启服务器: <code>npm start</code><br>
                            3. 点击"连接 Gateway"
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 配置按钮 -->
        <button
            id="configButton"
            class="fixed bottom-4 right-4 z-30 bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-full shadow-lg transition"
            title="打开配置"
        >
            ⚙️
        </button>
    </div>

    <script src="js/openclaw-gateway.js"></script>
    <script src="js/main.js"></script>
    <script src="js/additional.js"></script>
</body>
</html>
